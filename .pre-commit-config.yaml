---
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

# Pin hooks to Python 3.12 (the project's version). Left at the floating `python3`, pre-commit.ci
# builds on its newest interpreter (3.14), where dbt-common/mashumaro fail to import and crash the
# sqlfluff dbt templater. Pinning 3.12 keeps the dbt stack importable.
default_language_version:
  python: python3.12

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files

      - id: mixed-line-ending
        alias: check-line-endings
        name: check-line-endings
        args: ['--fix=no']

  - repo: https://github.com/pycqa/pydocstyle
    rev: 6.3.0
    hooks:
      - id: pydocstyle
        exclude: (__init__|setup|(docs?|examples?|tests?|utils?)/.*)\.py$
        additional_dependencies: ["tomli"]
        args:
          - --ignore=D107,D203,D212,D401
  - repo: "https://github.com/PyCQA/pylint"
    rev: v4.0.0
    hooks:
      - id: pylint
        exclude: (__init__|setup|(docs?|examples?|tests?|utils?)/.*)\.py$
        args: 
          [
            "--rcfile=./pyproject.toml"
          ]
  - repo: https://github.com/PyCQA/isort
    rev: 7.0.0
    hooks:
      - id: isort
        additional_dependencies: [toml]
  # Public-repo insurance: block secrets from being committed. Allowlist known findings in
  # .gitleaksignore; `make scan-secrets` runs the same scan over full history.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
  # Stub the gitignored sensitive seeds (only if absent) so the sqlfluff dbt templater below can
  # build its manifest in a public checkout (pre-commit.ci). No-op locally where real seeds exist.
  - repo: local
    hooks:
      - id: stub-sensitive-seeds
        name: stub sensitive seeds for dbt compile
        entry: bash scripts/stub_sensitive_seeds.sh
        language: system
        pass_filenames: false
        always_run: true

  - repo: https://github.com/sqlfluff/sqlfluff
    rev: 3.4.2
    hooks:
      - id: sqlfluff-lint
        additional_dependencies: ["dbt-duckdb==1.9.0", "sqlfluff-templater-dbt"]
        entry: sqlfluff lint --processes 1 --disable-progress-bar
      - id: sqlfluff-fix
        additional_dependencies: ["dbt-duckdb==1.9.0", "sqlfluff-templater-dbt"]
        entry: sqlfluff fix --show-lint-violations --processes 1 --disable-progress-bar
