name: "fantasy_footballer"
version: "1.0.0"

profile: "default"

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
# Two seed paths: gitignored sensitive seeds (owner data, auth) live under resources/;
# non-sensitive constant seeds (checked into git) live in seeds/ inside the project.
seed-paths: ["../../resources/sensitive_seeds", "seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"

models:
  fantasy_footballer:
    +contract:
      enforced: true
    +materialized: table
    +full_refresh: true
    marts:
      +schema: marts
    intermediate:
      +schema: intermediate
    staging:
      +schema: staging
    base:
      +schema: base

seeds:
  +schema: seed_data
  # Seeds drop-and-recreate so a changed column set can't break the delete+insert load.
  +full_refresh: true
