version: 2

models:
  - name: base_s001__teams
    description: Staging model for fantasy football teams with season-level performance and owner information
    columns:
      - name: team_year_id
        description: Unique identifier for the fantasy team
        data_type: varchar
        data_tests:
          - not_null
          - unique
      - name: team_id
        description: Unique identifier for the fantasy team
        data_type: int
        data_tests:
          - not_null
      - name: year
        description: Season year
        data_type: int
        data_tests:
          - not_null
      - name: team_abbrev
        description: Team abbreviation or short name
        data_type: varchar
        data_tests:
          - not_null
      - name: team_name
        description: Full team name
        data_type: varchar
        data_tests:
          - not_null
      - name: division_id
        description: Unique identifier for the division
        data_type: int
        data_tests:
          - not_null
      - name: division_name
        description: Division name
        data_type: varchar
        data_tests:
          - not_null
      - name: wins
        description: Total wins for the season
        data_type: int
        data_tests:
          - not_null
      - name: losses
        description: Total losses for the season
        data_type: int
        data_tests:
          - not_null
      - name: ties
        description: Total ties for the season
        data_type: int
        data_tests:
          - not_null
      - name: games_played
        description: Total ties for the season
        data_type: int
        data_tests:
          - not_null
      - name: points_for
        description: Total points scored by the team
        data_type: double
        data_tests:
          - not_null
      - name: points_against
        description: Total points scored against the team
        data_type: double
        data_tests:
          - not_null
      - name: acquisitions
        description: Total number of player acquisitions (waiver pickups and free agent adds)
        data_type: int
        data_tests:
          - not_null
      - name: acquisition_budget_spent
        description: Total FAAB (Free Agent Acquisition Budget) spent
        data_type: int
        data_tests:
          - not_null
      - name: drops
        description: Total number of players dropped
        data_type: int
        data_tests:
          - not_null
      - name: trades
        description: Total number of trades completed
        data_type: int
        data_tests:
          - not_null
      - name: playoff_pct
        description: Playoff probability percentage
        data_type: double
        data_tests:
          - not_null
      - name: draft_projected_rank
        description: Projected rank based on draft results
        data_type: int
        data_tests:
          - not_null
      - name: standing
        description: Current league standing
        data_type: int
        data_tests:
          - not_null
      - name: final_standing
        description: Final league standing at end of season
        data_type: int
        data_tests:
          - not_null
      - name: weeks_raw
        description: >
          Raw nested matchup data, one entry per matchup period: matchup score/outcome/opponent plus
          `lineups` — the roster captured per NFL week (a matchup period spans two NFL weeks in the
          2018-2019 playoffs).
        data_type: >
          struct(
            week int,
            lineups struct(
              week int,
              players struct(
                playerId varchar,
                lineupSlot varchar
              )[]
            )[],
            score_for double,
            outcome varchar,
            opponent_team_id int
          )[]
        data_tests:
          - not_null
      - name: first_name
        description: Team owner's first name (title case)
        data_type: varchar
        data_tests:
          - not_null
      - name: last_name
        description: Team owner's last name (title case)
        data_type: varchar
        data_tests:
          - not_null
      - name: display_name
        description: Team owner's full name (first name + last name)
        data_type: varchar
        data_tests:
          - not_null
      - name: streak_type
        description: Type of streak (W for wins, L for losses)
        data_type: varchar
        data_tests:
          - not_null
      - name: streak_length
        description: Length of streak
        data_type: varchar
        data_tests:
          - not_null
      - name: streak
        description: Current streak in format of type + length (e.g., W3, L2)
        data_type: varchar
        data_tests:
          - not_null
      - name: meta__source_path
        data_type: varchar
        data_tests:
          - not_null
      - name: meta__date_effective
        data_type: date
        data_tests:
          - not_null
      - name: meta__date_pulled
        data_type: date
        data_tests:
          - not_null
