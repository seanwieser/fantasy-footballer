version: 2

models:
  - name: int__optimal_lineup_players
    description: >
      One row per team-week-player (regular season + meaningful postseason games): `is_started` (the
      owner started them) and `is_optimal` (they belong in the best legal lineup that week), with
      `actual_slot`, `optimal_slot`, and `is_playoff`. The building block for `int__optimal_lineups`
      (team-week totals, regular season only) and the owner-spotlight weekly Roster view (actual vs
      optimal, which also covers postseason weeks). See [[stg__team_week_players]].
    columns:
      - name: team_year_id
        data_type: varchar
        data_tests:
          - not_null
      - name: team_week_id
        data_type: varchar
        data_tests:
          - not_null
      - name: player_week_id
        description: playerid_year_week — the grain
        data_type: varchar
        data_tests:
          - not_null
          - unique
      - name: player_id
        data_type: varchar
        data_tests:
          - not_null
      - name: player_name
        data_type: varchar
        data_tests:
          - not_null
      - name: year
        data_type: int
        data_tests:
          - not_null
      - name: week
        data_type: int
        data_tests:
          - not_null
      - name: is_playoff
        description: This team-week is a meaningful postseason game (excluded from season aggregates)
        data_type: bool
        data_tests:
          - not_null
      - name: position
        description: Player's position slot designation
        data_type: varchar
        data_tests:
          - not_null
      - name: points
        description: Fantasy points the player scored that week
        data_type: double
        data_tests:
          - not_null
      - name: is_started
        description: The owner started the player this week (active, non-bench/IR slot)
        data_type: bool
        data_tests:
          - not_null
      - name: is_optimal
        description: The player belongs in the best legal lineup the owner could have set that week
        data_type: bool
        data_tests:
          - not_null
      - name: actual_slot
        description: The lineup slot the owner actually used (QB/RB/WR/TE/FLEX/K/D ST or BE/IR)
        data_type: varchar
        data_tests:
          - not_null
      - name: optimal_slot
        description: The slot this player fills in the optimal lineup (position or FLEX); null if not optimal
        data_type: varchar
