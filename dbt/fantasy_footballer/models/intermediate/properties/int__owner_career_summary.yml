version: 2

models:
  - name: int__owner_career_summary
    description: >
      One row per owner with their career roll-ups across all seasons: tennis-style title counts
      (seasons each title was held), cumulative lucky/unlucky/shotgun and clutch win-loss totals,
      and career points / games / points-per-game / clutch win %. Aggregates
      [[int__season_titles_long]] and [[int__owner_season_scoring]]; feeds the all-time
      league-highlights mart so the mart stays a thin select.
    columns:
      - name: owner_id
        data_type: int
        data_tests:
          - not_null
          - unique
      - name: owner_name
        data_type: varchar
        data_tests:
          - not_null
      - name: scoring_title_count
        data_type: int
        data_tests:
          - not_null
      - name: non_scoring_title_count
        data_type: int
        data_tests:
          - not_null
      - name: matchup_title_count
        data_type: int
        data_tests:
          - not_null
      - name: bad_matchup_title_count
        data_type: int
        data_tests:
          - not_null
      - name: non_playoff_scoring_title_count
        data_type: int
        data_tests:
          - not_null
      - name: playoff_non_scoring_title_count
        data_type: int
        data_tests:
          - not_null
      - name: clutch_winning_title_count
        data_type: int
        data_tests:
          - not_null
      - name: clutch_losing_title_count
        data_type: int
        data_tests:
          - not_null
      - name: shotgun_title_count
        data_type: int
        data_tests:
          - not_null
      - name: no_shotgun_season_count
        data_type: int
        data_tests:
          - not_null
      - name: best_lineup_title_count
        description: Seasons with the fewest regular-season points left on the bench vs optimal
        data_type: int
        data_tests:
          - not_null
      - name: worst_lineup_title_count
        description: Seasons with the most regular-season points left on the bench vs optimal
        data_type: int
        data_tests:
          - not_null
      - name: most_efficient_lineup_title_count
        description: Seasons capturing the highest share of the optimal lineup (efficiency)
        data_type: int
        data_tests:
          - not_null
      - name: least_efficient_lineup_title_count
        description: Seasons capturing the lowest share of the optimal lineup (efficiency)
        data_type: int
        data_tests:
          - not_null
      - name: lucky_schedule_title_count
        description: Seasons leading the league in wins above a schedule-neutral expectation
        data_type: int
        data_tests:
          - not_null
      - name: unlucky_schedule_title_count
        description: Seasons leading the league in wins below a schedule-neutral expectation (most robbed)
        data_type: int
        data_tests:
          - not_null
      - name: all_play_snub_title_count
        description: Seasons that were the league's biggest merit-based (all-play) snub
        data_type: int
        data_tests:
          - not_null
      - name: all_play_luck_in_title_count
        description: Seasons that were the league's biggest merit-based (all-play) lucky-in
        data_type: int
        data_tests:
          - not_null
      - name: seasons_played
        description: Number of regular seasons the owner fielded a team
        data_type: int
        data_tests:
          - not_null
      - name: snub_total
        description: Career count of snubbed seasons (missed playoffs but outscored a team that made it)
        data_type: int
        data_tests:
          - not_null
      - name: luck_in_total
        description: Career count of lucked-in seasons (made playoffs but outscored by a team that missed)
        data_type: int
        data_tests:
          - not_null
      - name: all_play_snub_total
        description: Career count of merit-based snub seasons (missed playoffs but out-played a team that made it)
        data_type: int
        data_tests:
          - not_null
      - name: all_play_luck_in_total
        description: Career count of merit-based lucked-in seasons (made playoffs but out-played by a team that missed)
        data_type: int
        data_tests:
          - not_null
      - name: expected_wins_total
        description: Career schedule-neutral expected wins (sum of season expected_wins)
        data_type: double
        data_tests:
          - not_null
      - name: actual_wins_total
        description: Career actual regular-season wins (sum of season actual_wins)
        data_type: double
        data_tests:
          - not_null
      - name: schedule_luck_total
        description: Career schedule luck (actual_wins_total - expected_wins_total); + lucky, - robbed
        data_type: double
        data_tests:
          - not_null
      - name: all_play_win_pct
        description: Career all-play win% across every regular-season week
        data_type: double
        data_tests:
          - not_null
      - name: lucky_wins_total
        description: Career lucky-win weeks (won with a below-.500 all-play standing), from int__owner_season_all_play
        data_type: double
        data_tests:
          - not_null
      - name: unlucky_losses_total
        description: Career unlucky-loss weeks (lost with an above-.500 all-play standing), from int__owner_season_all_play
        data_type: double
        data_tests:
          - not_null
      - name: shotgun_total
        description: Career cumulative shotguns
        data_type: double
        data_tests:
          - not_null
      - name: clutch_wins_total
        description: Career cumulative clutch wins (games decided by < 10)
        data_type: double
        data_tests:
          - not_null
      - name: clutch_losses_total
        description: Career cumulative clutch losses
        data_type: double
        data_tests:
          - not_null
      - name: points_total
        description: Career cumulative regular-season points
        data_type: double
        data_tests:
          - not_null
      - name: games_total
        description: Career regular-season games played
        data_type: double
        data_tests:
          - not_null
      - name: points_per_game
        description: Career regular-season points per game
        data_type: double
        data_tests:
          - not_null
      - name: clutch_win_pct
        description: Career clutch win percentage (null if the owner never played a clutch game)
        data_type: double
      - name: acquisitions_total
        description: Career roster acquisitions (waiver / free-agent adds) across every season
        data_type: int
        data_tests:
          - not_null
      - name: trades_total
        description: Career trades completed across every season
        data_type: int
        data_tests:
          - not_null
