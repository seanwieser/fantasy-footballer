version: 2

models:
  - name: int__season_titles_long
    description: >
      One row per owner-season x title metric — the tidy/unpivoted form of int__season_titles.
      Every owner-season produces one row for each title metric, carrying the metric's
      defining amount that season and whether the owner held the title. The single place the
      title -> amount -> holder mapping is defined; the league-highlights marts and
      int__owner_career_summary all read from here. See [[int__season_titles]].
    columns:
      - name: owner_id
        data_type: int
        data_tests:
          - not_null
      - name: owner_name
        data_type: varchar
        data_tests:
          - not_null
      - name: owner_year_id
        data_type: varchar
        data_tests:
          - not_null
      - name: team_year_id
        data_type: varchar
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int__owner_team_year_map')
                field: team_year_id
      - name: year
        data_type: int
        data_tests:
          - not_null
      - name: metric_key
        description: The title metric this row represents (e.g. scoring_title, shotgun_title)
        data_type: varchar
        data_tests:
          - not_null
      - name: amount
        description: The metric's defining value for this owner-season (points, clutch wins, shotguns, ...)
        data_type: double
        data_tests:
          - not_null
      - name: is_title_holder
        description: True if this owner held the title that season (co-titles all flagged)
        data_type: bool
        data_tests:
          - not_null
