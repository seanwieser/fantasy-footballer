version: 2

models:
  - name: all_time_records
    description: >
      One row per metric x ranked owner (tidy/long) covering the all-time league-highlights
      catalog. Tennis-style title counts, career totals, and single-extreme records are unioned
      into a shared shape; leaderboards keep the top 3 (rank 1..N), single records keep rank 1.
      The frontend filters by section/category and renders display_value. See the
      league-highlights doc and MODELS.md.
    columns:
      - name: section
        description: Top-level grouping (Scoring, Clutch, Matchups, Shotgun)
        data_type: varchar
        data_tests:
          - not_null
      - name: category
        description: Sub-group within a section (Season, Matchup, Playoff, Luck, Margins, Clutch, Shotgun)
        data_type: varchar
        data_tests:
          - not_null
      - name: metric_key
        description: Stable identifier for the metric
        data_type: varchar
        data_tests:
          - not_null
      - name: metric_label
        description: Human-readable metric name
        data_type: varchar
        data_tests:
          - not_null
      - name: description
        description: One-line explanation of the metric, surfaced as a card tooltip
        data_type: varchar
        data_tests:
          - not_null
      - name: subtitle_kind
        description: >
          Drives the per-row subtitle: 'years' (season-award counts list the years won),
          'tenure' (career accumulations show seasons-played), 'context' (single records show
          year/week/opponent detail).
        data_type: varchar
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [ 'years', 'tenure', 'context' ]
      - name: years_won
        description: >
          Chronological comma-joined list of seasons the owner held this title; populated only
          for subtitle_kind = 'years' (season-award counts), null otherwise.
        data_type: varchar
      - name: glossary_slug
        description: "The metric's concept slug (from the seed) — lets the card deep-link to /glossary#<slug>."
        data_type: varchar
      - name: display_order
        description: >
          Reading order within a section (single week -> season -> career -> titles); the frontend
          orders cards and sub-clusters by it.
        data_type: int
        data_tests:
          - not_null
      - name: metric_type
        description: count (tennis-style or cumulative), total (career aggregate), or record (single extreme)
        data_type: varchar
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [ 'count', 'total', 'record' ]
      - name: owner_id
        data_type: int
        data_tests:
          - not_null
      - name: owner_name
        data_type: varchar
        data_tests:
          - not_null
      - name: display_value
        description: Pre-formatted value string (integer, points, or percentage)
        data_type: varchar
        data_tests:
          - not_null
      - name: season_or_week
        description: Context for record rows (year, "year Wnn", or "year (W-L)"); null for career aggregates
        data_type: varchar
      - name: detail
        description: >
          Secondary descriptor behind the value — clutch W-L record for clutch-% rows, the losing
          owner + winner-loser score for margin records; null otherwise
        data_type: varchar
      - name: rank
        description: Rank within the metric (1 = best); leaderboards keep 1..3, single records keep 1
        data_type: int
        data_tests:
          - not_null
