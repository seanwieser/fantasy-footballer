version: 2

models:
  - name: season_highlights
    description: >
      One row per year x metric_key for the per-season league-highlights view. Every metric is a
      single-winner season title (co-titles share rank 1): award holders come from the
      int__season_titles flags, and the tightest game / biggest blowout from int__matchup_margins.
      The frontend filters by year and renders holder + amount + the precomposed detail subtitle.
      See MODELS.md.
    columns:
      - name: section
        description: Top-level grouping (Scoring, Matchups, Shotgun, Clutch) the cards cluster under
        data_type: varchar
        data_tests:
          - not_null
      - name: metric_key
        description: Stable identifier for the metric
        data_type: varchar
        data_tests:
          - not_null
      - name: metric_label
        description: Human-readable metric name
        data_type: varchar
        data_tests:
          - not_null
      - name: description
        description: One-line explanation of the metric, surfaced as a card tooltip
        data_type: varchar
        data_tests:
          - not_null
      - name: display_order
        description: Reading order of the title cards within a section
        data_type: int
        data_tests:
          - not_null
      - name: year
        data_type: int
        data_tests:
          - not_null
      - name: owner_id
        data_type: int
        data_tests:
          - not_null
      - name: owner_name
        data_type: varchar
        data_tests:
          - not_null
      - name: display_value
        description: >
          Pre-formatted value string (integer, points, or percentage). Clutch titles instead
          headline the clutch W-L record (e.g. "3-0").
        data_type: varchar
        data_tests:
          - not_null
      - name: detail
        description: >
          Card subtitle, fully composed here so the frontend renders it as-is. Margin rows: a
          "def. {opponent} · {winner-loser score} · Wk N" line. Title rows: how/when/where the
          title was earned — end-of-regular-season seed ("7th seed"), the key week(s) ("Wks 3, 7,
          11"), per metric. Null for clutch titles (the record is the value) and clean-season titles.
        data_type: varchar
      - name: rank
        description: Always 1 — single-winner title (co-titles share rank 1)
        data_type: int
        data_tests:
          - not_null
