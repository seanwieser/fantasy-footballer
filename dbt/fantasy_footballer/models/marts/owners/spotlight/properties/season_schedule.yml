version: 2

models:
  - name: season_schedule
    description: >
      One row per owner-week of the regular season: the matchup result, scores, and a boolean
      flag per week-grain highlight (best/worst single week, lucky win / unlucky loss, shotgun,
      clutch). The spotlight page renders the flags as section-colored chips with a legend.
    columns:
      - name: owner_id
        description: Unique identifier for the team owner
        data_type: int
        tests:
          - not_null
      - name: year
        description: Season year
        data_type: int
        tests:
          - not_null
      - name: week
        description: Week number of the matchup
        data_type: int
        tests:
          - not_null
      - name: opponent_team_name
        description: Name of the opponent's team
        data_type: varchar
      - name: opponent_owner_name
        description: Display name of the opponent owner
        data_type: varchar
      - name: outcome
        description: Result of the matchup (W / L / T; empty string for an unplayed week)
        data_type: varchar
      - name: score_for
        description: Points scored by the owner (0 for an unplayed week)
        data_type: double
      - name: score_against
        description: Points scored by the opponent (0 for an unplayed week)
        data_type: double
      - name: is_clutch_win
        description: Won a game decided by fewer than 10 points
        data_type: boolean
      - name: is_clutch_loss
        description: Lost a game decided by fewer than 10 points
        data_type: boolean
      - name: is_shotgun
        description: Scored under 100 points or the week's league low
        data_type: boolean
      - name: is_lucky_win
        description: Won the week while scoring below the league median
        data_type: boolean
      - name: is_unlucky_loss
        description: Lost the week while scoring above the league median
        data_type: boolean
      - name: is_best_week
        description: Held the league Best-week title that week (single highest score in the league this season)
        data_type: boolean
      - name: is_worst_week
        description: Held the league Worst-week title that week (single lowest score in the league this season)
        data_type: boolean
      - name: is_tightest_game
        description: Won the season's single tightest game (smallest league margin of victory)
        data_type: boolean
      - name: is_biggest_blowout
        description: Won the season's single biggest blowout (largest league margin of victory)
        data_type: boolean
