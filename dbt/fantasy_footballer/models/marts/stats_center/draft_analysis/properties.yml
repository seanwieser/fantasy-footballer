      - name: player
        description: "Name of the player drafted"
        data_type: varchar
        data_tests:
          - not_null
      - name: position
        description: "Player's position slot designation"
        data_type: varchar
        data_tests:
          - not_null
      - name: round
        description: "Draft round number"
        data_type: int
        data_tests:
          - not_null
      - name: round_pick
