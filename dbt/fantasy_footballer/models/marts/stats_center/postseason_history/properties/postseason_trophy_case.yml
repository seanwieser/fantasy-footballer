version: 2

models:
  - name: postseason_trophy_case
    description: >
      One row per owner: the career postseason trophy case for the Postseason History page
      (championships, runner-ups, 3rd places, toilet bowls, playoff W-L, best finish). Thin
      display wrap of int__owner_postseason_summary, ordered most-decorated first. See MODELS.md.
    columns:
      - name: owner_id
        data_type: int
        data_tests:
          - not_null
          - unique
      - name: owner_name
        data_type: varchar
        data_tests:
          - not_null
      - name: playoff_appearances
        description: Seasons the owner reached the winners bracket
        data_type: int
        data_tests:
          - not_null
      - name: championships
        data_type: int
        data_tests:
          - not_null
      - name: runner_ups
        data_type: int
        data_tests:
          - not_null
      - name: third_places
        data_type: int
        data_tests:
          - not_null
      - name: toilet_bowl_appearances
        data_type: int
        data_tests:
          - not_null
      - name: last_place_finishes
        description: Dead-last finishes (toilet-bowl winner)
        data_type: int
        data_tests:
          - not_null
      - name: second_to_last_finishes
        data_type: int
        data_tests:
          - not_null
      - name: best_finish
        description: Best (lowest) final standing the owner has ever reached
        data_type: int
        data_tests:
          - not_null
      - name: playoff_wins
        description: Championship-bracket wins (the true playoff record; reconciles with playoff_appearances)
        data_type: int
        data_tests:
          - not_null
      - name: playoff_losses
        data_type: int
        data_tests:
          - not_null
      - name: toilet_bowl_wins
        description: Toilet-bowl-bracket wins (kept separate from the playoff record)
        data_type: int
        data_tests:
          - not_null
      - name: toilet_bowl_losses
        data_type: int
        data_tests:
          - not_null
