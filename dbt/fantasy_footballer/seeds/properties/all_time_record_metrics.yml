version: 2

seeds:
  - name: all_time_record_metrics
    description: >
      League-highlights All-Time metric catalog (one row per metric). Git-tracked constant
      seed defining each metric's section/category/label, type, sort direction, result count,
      value format, and tooltip description. Drives all_time_records.
    data_tests:
      - assert_model_has_rows
    columns:
      - name: metric_key
        description: "Stable metric identifier joined to the computed values."
        data_type: varchar
        data_tests:
          - not_null
          - unique
          # No orphan catalog rows: every metric_key must produce at least one all_time_records row
          # (catches a seed entry whose candidate branch was never added, or a typo'd key).
          - assert_all_values_present:
              arguments:
                to: ref('all_time_records')
                field: metric_key
      - name: section
        description: "Top-level grouping the cards cluster under — must match the frontend's SECTIONS / SECTION_COLORS keys, else the section renders with no color/icon."
        data_type: varchar
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [ 'Scoring', 'Postseason', 'Matchups', 'Shotgun', 'Clutch', 'Transactions' ]
      - name: category
        data_type: varchar
        data_tests:
          - not_null
      - name: metric_label
        data_type: varchar
        data_tests:
          - not_null
      - name: metric_type
        description: "count, total, or record."
        data_type: varchar
        data_tests:
          - not_null
      - name: sort_sign
        description: "1 to rank ascending-best, -1 for descending-best."
        data_type: int
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [ 1, -1 ]
      - name: result_n
        description: "How many ranks to keep (1 = single extreme, 3 = top-3 leaderboard)."
        data_type: int
        data_tests:
          - not_null
      - name: value_format
        description: "int, points, or pct — drives display formatting."
        data_type: varchar
        data_tests:
          - not_null
      - name: subtitle_kind
        description: "What the card's per-row subtitle should show: 'years' (season-award counts list the years won), 'tenure' (career accumulations show seasons-played), or 'context' (single records show year/week/opponent detail)."
        data_type: varchar
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [ 'years', 'tenure', 'context' ]
      - name: display_order
        description: "Reading order within a section — smaller-scope/most-extreme metrics first (single week -> season -> career -> titles), driving both card and sub-cluster order."
        data_type: int
        data_tests:
          - not_null
          - unique
      - name: description
        description: "Tooltip text shown on the card."
        data_type: varchar
        data_tests:
          - not_null
