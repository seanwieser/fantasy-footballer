version: 2

seeds:
  - name: display_names
    description: "Mapping between owner_id and display_name."
    data_tests:
      - assert_model_has_rows
    columns:
      - name: display_name
        description: "Owner display name set by owner."
        data_type: varchar
        data_tests:
          - not_null
      - name: owner_id
        description: "Owner id that persists over years."
        data_type: int
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('owner_names')
                field: owner_id
