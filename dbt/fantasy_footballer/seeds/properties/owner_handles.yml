version: 2

seeds:
  - name: owner_handles
    description: "Mapping between owner_id and owner_handle."
    data_tests:
      - assert_model_has_rows
    columns:
      - name: handle
        description: "Owner handle that persists over years."
        data_type: varchar
        data_tests:
          - not_null
      - name: owner_id
        description: "Owner id that persists over years."
        data_type: int
        data_tests:
          - not_null
