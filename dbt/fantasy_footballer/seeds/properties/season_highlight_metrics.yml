version: 2

seeds:
  - name: season_highlight_metrics
    description: >
      League-highlights By-Season metric catalog (one row per metric). Git-tracked constant
      seed defining each season metric's category/label, sort direction, value format, and
      tooltip description. Every By-Season metric is a single-winner title. Drives season_highlights.
    data_tests:
      - assert_model_has_rows
    columns:
      - name: metric_key
        description: "Stable metric identifier joined to the computed values."
        data_type: varchar
        data_tests:
          - not_null
          - unique
      - name: category
        data_type: varchar
        data_tests:
          - not_null
      - name: section
        description: "Top-level grouping the By-Season cards cluster under — must match the frontend's SECTIONS / SECTION_COLORS keys, else the section renders with no color/icon."
        data_type: varchar
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [ 'Scoring', 'Postseason', 'Matchups', 'Shotgun', 'Clutch', 'Transactions', 'Lineups' ]
      - name: metric_label
        data_type: varchar
        data_tests:
          - not_null
      - name: sort_sign
        description: "1 to rank ascending-best, -1 for descending-best."
        data_type: int
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [ 1, -1 ]
      - name: value_format
        description: "int, points, or pct — drives display formatting."
        data_type: varchar
        data_tests:
          - not_null
      - name: display_order
        description: "Reading order of the title cards within a section."
        data_type: int
        data_tests:
          - not_null
          - unique
      - name: description
        description: "Tooltip text shown on the card."
        data_type: varchar
        data_tests:
          - not_null
      - name: empty_label
        description: "Message shown on the placeholder card when no owner earned this title in a season (e.g. 'Everyone shotgunned this season'). Null for titles that always have a holder (scoring and margin titles)."
        data_type: varchar
